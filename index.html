<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Attendance Tracker</title>
    <style>
        /* ===== Theme variables ===== */
        body, body.theme-default {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --primary: #2c3e50;
            --secondary: #3498db;
            --border: #ddd;
            --success: #27ae60;
            --container-bg: white;
            --patient-name-bg: #f9f9f9;
            --total-cell-bg: #e8f4f8;
            --modal-bg: white;
            --input-bg: white;
            --th-text: white;
            --btn-text: white;
            --row-hover: #f0f4f8;
            --secondary-hover: #2980b9;
            --success-hover: #219a52;
            --edit-btn-bg: #e67e22;
            --edit-btn-hover: #d35400;
            --cancel-btn-bg: #95a5a6;
            --cancel-btn-hover: #7f8c8d;
        }
        body.theme-dark {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary: #1e3a5f;
            --secondary: #4a9eff;
            --border: #333;
            --success: #2ecc71;
            --container-bg: #1e1e2e;
            --patient-name-bg: #2a2a3e;
            --total-cell-bg: #1a2a3e;
            --modal-bg: #1e1e2e;
            --input-bg: #2a2a3e;
            --th-text: #e0e0e0;
            --btn-text: white;
            --row-hover: #2a2a3e;
            --secondary-hover: #3a8eef;
            --success-hover: #27ae60;
            --edit-btn-bg: #d35400;
            --edit-btn-hover: #a04000;
            --cancel-btn-bg: #555;
            --cancel-btn-hover: #444;
        }
        body.theme-oregon {
            --bg-color: #f5f2e6;
            --text-color: #2d2d2d;
            --primary: #154734;
            --secondary: #154734;
            --border: #c8b88a;
            --success: #154734;
            --container-bg: #fffdf5;
            --patient-name-bg: #edf3e8;
            --total-cell-bg: #dde6cc;
            --modal-bg: #fffdf5;
            --input-bg: #fffdf5;
            --th-text: #FEE123;
            --btn-text: #FEE123;
            --row-hover: #edf3e8;
            --secondary-hover: #0d3320;
            --success-hover: #0d3320;
            --edit-btn-bg: #154734;
            --edit-btn-hover: #0d3320;
            --cancel-btn-bg: #8a7a5a;
            --cancel-btn-hover: #6d5f45;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background: var(--container-bg);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .controls select, .controls button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-left: 10px;
        }
        .controls select {
            background: var(--input-bg);
            color: var(--text-color);
        }
        .controls button {
            background-color: var(--secondary);
            color: var(--btn-text);
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .controls button:hover {
            background-color: var(--secondary-hover);
        }
        .controls button.export-btn {
            background-color: var(--success);
        }
        .controls button.export-btn:hover {
            background-color: var(--success-hover);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        tbody tr:hover {
            background-color: var(--row-hover);
        }
        th, td {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: var(--primary);
            color: var(--th-text);
        }
        td.patient-name {
            text-align: left;
            font-weight: bold;
            background-color: var(--patient-name-bg);
        }
        select.time-select {
            width: 100%;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-color);
        }
        .total-cell {
            font-weight: bold;
            background-color: var(--total-cell-bg);
        }
        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--modal-bg);
            color: var(--text-color);
            border-radius: 8px;
            padding: 25px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .modal-box h3 {
            margin-top: 0;
            color: var(--primary);
        }
        .modal-unit-group {
            margin-bottom: 18px;
        }
        .modal-unit-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: var(--primary);
        }
        .modal-unit-group textarea {
            width: 100%;
            height: 100px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-color);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }
        .modal-actions button {
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-actions .save-btn {
            background-color: var(--success);
            color: var(--btn-text);
        }
        .modal-actions .save-btn:hover {
            background-color: var(--success-hover);
        }
        .modal-actions .cancel-btn {
            background-color: var(--cancel-btn-bg);
            color: var(--btn-text);
        }
        .modal-actions .cancel-btn:hover {
            background-color: var(--cancel-btn-hover);
        }
        .controls button.edit-btn {
            background-color: var(--edit-btn-bg);
        }
        .controls button.edit-btn:hover {
            background-color: var(--edit-btn-hover);
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h2>Activity Attendance Tracker</h2>
        <div class="controls">
            <select id="unitSelect" onchange="loadUnitData()">
                <option value="unit1">Unit 1 (North)</option>
                <option value="unit2">Unit 2 (South)</option>
                <option value="unit3">Unit 3 (East)</option>
            </select>
            <button class="export-btn" onclick="exportToCSV()">Export to CSV</button>
            <button class="edit-btn" onclick="openEditPatients()">Edit Patients</button>
            <select id="themeSelect" onchange="setTheme(this.value)">
                <option value="default">Default</option>
                <option value="dark">Dark</option>
                <option value="oregon">Oregon Green</option>
            </select>
        </div>
    </header>
    <table id="attendanceTable">
        <thead>
            <tr>
                <th>Patient Name</th>
                <th>Mon (EVE)</th>
                <th>Tue (EVE)</th>
                <th>Wed (EVE)</th>
                <th>Thu (EVE)</th>
                <th>Fri (EVE)</th>
                <th>Saturday</th>
                <th>Sunday</th>
                <th>Weekly Tot</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<!-- Edit Patients Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <h3>Edit Patient Lists</h3>
        <p style="color:#666;margin-bottom:15px;">One name per line. Changes preserve existing attendance data for patients whose names stay the same.</p>
        <div class="modal-unit-group">
            <label>Unit 1 (North)</label>
            <textarea id="edit-unit1"></textarea>
        </div>
        <div class="modal-unit-group">
            <label>Unit 2 (South)</label>
            <textarea id="edit-unit2"></textarea>
        </div>
        <div class="modal-unit-group">
            <label>Unit 3 (East)</label>
            <textarea id="edit-unit3"></textarea>
        </div>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeEditPatients()">Cancel</button>
            <button class="save-btn" onclick="saveEditPatients()">Save Patients</button>
        </div>
    </div>
</div>

<script>
    // Dummy Database - Can be easily expanded or modified
    const database = {
        unit1: ["BOB", "ALSOBOB", "BOBLOBLAW", "HANK", "HANKY", "HANKYDOODLE"],
        unit2: ["ALICE", "SALLY", "JIM", "DWIGHT", "PAM", "MICHAEL"],
        unit3: ["JANE", "JOHN", "DOE", "SMITH", "WESSON", "CLARK"]
    };
    // Store state to keep data when switching units
    let state = {};
    const timeOptionsWeekdays = [0, 45, 90];
    const timeOptionsWeekend = [0, 45, 90, 120, 240, 330];
    function initializeState() {
        for (const unit in database) {
            state[unit] = {};
            database[unit].forEach(patient => {
                state[unit][patient] = { mon:0, tue:0, wed:0, thu:0, fri:0, sat:0, sun:0 };
            });
        }
    }
    function createDropdown(day, currentValue, isWeekend) {
        let options = isWeekend ? timeOptionsWeekend : timeOptionsWeekdays;
        let html = `<select class="time-select" onchange="updateTotal(this)">`;
        options.forEach(opt => {
            let selected = (opt == currentValue) ? "selected" : "";
            let text = opt === 0 ? "-" : opt;
            html += `<option value="${opt}" ${selected}>${text}</option>`;
        });
        html += `</select>`;
        return html;
    }
    function loadUnitData() {
        const unit = document.getElementById("unitSelect").value;
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        database[unit].forEach(patient => {
            const rowData = state[unit][patient];
            let row = document.createElement("tr");
            row.setAttribute("data-patient", patient);
            row.innerHTML = `
                <td class="patient-name">${patient}</td>
                <td>${createDropdown('mon', rowData.mon, false)}</td>
                <td>${createDropdown('tue', rowData.tue, false)}</td>
                <td>${createDropdown('wed', rowData.wed, false)}</td>
                <td>${createDropdown('thu', rowData.thu, false)}</td>
                <td>${createDropdown('fri', rowData.fri, false)}</td>
                <td>${createDropdown('sat', rowData.sat, true)}</td>
                <td>${createDropdown('sun', rowData.sun, true)}</td>
                <td class="total-cell">0</td>
            `;
            tbody.appendChild(row);
            calculateRowTotal(row); // Initial calculation
        });
    }
    function updateTotal(selectElement) {
        const row = selectElement.closest("tr");
        const patient = row.getAttribute("data-patient");
        const unit = document.getElementById("unitSelect").value;
        // Update state array
        const selects = row.querySelectorAll("select");
        state[unit][patient].mon = parseInt(selects[0].value);
        state[unit][patient].tue = parseInt(selects[1].value);
        state[unit][patient].wed = parseInt(selects[2].value);
        state[unit][patient].thu = parseInt(selects[3].value);
        state[unit][patient].fri = parseInt(selects[4].value);
        state[unit][patient].sat = parseInt(selects[5].value);
        state[unit][patient].sun = parseInt(selects[6].value);
        calculateRowTotal(row);
    }
    function calculateRowTotal(row) {
        let total = 0;
        const selects = row.querySelectorAll("select");
        selects.forEach(select => {
            total += parseInt(select.value) || 0;
        });
        row.querySelector(".total-cell").innerText = total;
    }
    function exportToCSV() {
        const unit = document.getElementById("unitSelect").options[document.getElementById("unitSelect").selectedIndex].text;
        let csvContent = "data:text/csv;charset=utf-8,";
        // Header
        csvContent += `Unit: ${unit}\n`;
        csvContent += "Patient Name,Mon (EVE),Tue (EVE),Wed (EVE),Thu (EVE),Fri (EVE),Saturday,Sunday,Weekly Tot\n";
        // Body
        const rows = document.querySelectorAll("#attendanceTable tbody tr");
        rows.forEach(row => {
            let rowData = [];
            rowData.push(row.querySelector(".patient-name").innerText);
            const selects = row.querySelectorAll("select");
            selects.forEach(select => rowData.push(select.value));
            rowData.push(row.querySelector(".total-cell").innerText);
            csvContent += rowData.join(",") + "\n";
        });
        // Download action
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Attendance_Report_${unit.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    // Patient list editor
    function openEditPatients() {
        document.getElementById('edit-unit1').value = database.unit1.join('\n');
        document.getElementById('edit-unit2').value = database.unit2.join('\n');
        document.getElementById('edit-unit3').value = database.unit3.join('\n');
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditPatients() {
        document.getElementById('editModal').classList.remove('active');
    }
    function saveEditPatients() {
        const units = ['unit1', 'unit2', 'unit3'];
        const textareaIds = ['edit-unit1', 'edit-unit2', 'edit-unit3'];
        const unitNames = ['Unit 1 (North)', 'Unit 2 (South)', 'Unit 3 (East)'];
        // Parse each unit's textarea
        let newDatabase = {};
        textareaIds.forEach((id, i) => {
            const lines = document.getElementById(id).value
                .split('\n')
                .map(s => s.trim().toUpperCase())
                .filter(s => s.length > 0);
            if (lines.length === 0) {
                alert(`${unitNames[i]} must have at least one patient.`);
                return;
            }
            newDatabase[units[i]] = lines;
        });
        // Check all units parsed OK before saving
        for (const u of units) {
            if (!newDatabase[u] || newDatabase[u].length === 0) return;
        }
        // Update database and preserve existing state by patient name
        for (const u of units) {
            const oldState = state[u] || {};
            database[u] = newDatabase[u];
            state[u] = {};
            database[u].forEach(patient => {
                state[u][patient] = oldState[patient] || { mon:0, tue:0, wed:0, thu:0, fri:0, sat:0, sun:0 };
            });
        }
        closeEditPatients();
        loadUnitData();
    }
    // Close modal on overlay click
    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditPatients();
    });
    // Theme switcher
    function setTheme(theme) {
        document.body.className = 'theme-' + theme;
        localStorage.setItem('attendance-theme', theme);
    }
    // Load saved theme
    (function loadSavedTheme() {
        const saved = localStorage.getItem('attendance-theme');
        if (saved) {
            document.body.className = 'theme-' + saved;
            document.getElementById('themeSelect').value = saved;
        }
    })();
    // Run on boot
    initializeState();
    loadUnitData();
</script>
</body>
</html>
